<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ShopSimple — Minimal Store</title>
  <link rel="stylesheet" href="style.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
  <!-- Navigation Header -->
  <header>
    <div class="logo">ShopSimple</div>
    <button id="cart-btn">
      Cart
      <span id="cart-count">0</span>
    </button>
  </header>

  <!-- Hero Section -->
  <section class="hero">
    <h1>Simple products, great prices</h1>
    <p>Shop electronics, jewelry, fashion & more — all in one place.</p>
  </section>

  <!-- Main Content Layout -->
  <main>
    <!-- Left Sidebar: Filters -->
    <aside class="filters">
      <h3>Search</h3>
      <input type="text" id="search" placeholder="Search products...">
      
      <h3>Category</h3>
      <div id="categories" class="categories">
        <button class="active" data-cat="all">All</button>
        <!-- Categories injected by JS -->
      </div>
      
      <div class="price-filter">
        <label><span>Max Price</span> <span id="price-val">₹1000</span></label>
        <input type="range" id="price" min="0" max="1000" step="5">
      </div>
    </aside>

    <!-- Right Side: Products Grid -->
    <section class="products-area">
      <h2 id="status">Loading products...</h2>
      <div id="grid" class="grid">
        <!-- Products injected by JS -->
      </div>
    </section>
  </main>

  <!-- Cart Modal Drawer -->
  <div id="cart-modal" class="modal">
    <div class="modal-content">
      <div class="modal-header">
        <h2>Your Cart</h2>
        <button id="close-cart" class="close-cart">&times;</button>
      </div>
      
      <div id="cart-items" class="cart-items">
        <!-- Cart items injected by JS -->
      </div>
      
      <div class="modal-footer">
        <div class="total-row">
          <span>Total</span>
          <span id="cart-total">₹0</span>
        </div>
        <button id="checkout">Checkout</button>
      </div>
    </div>
  </div>

  <!-- Toast Notification -->
  <div id="toast" class="toast">Message</div>

  <script src="script.js"></script>
</body>
</html>
