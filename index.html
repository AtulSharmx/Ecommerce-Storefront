<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ShopSimple | Clean Minimal Store</title>
  <meta name="description" content="Browse our curated collection of electronics, jewelry, fashion, and everyday essentials.">

  <!-- Google Font: Inter -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

  <!-- Main Styles -->
  <link rel="stylesheet" href="style.css">
</head>
<body>


  <!-- Navigation Bar -->
  <header class="navbar">
    <div class="nav-container">

      <!-- Store Logo -->
      <a href="#" class="brand-logo">
        <svg class="logo-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none"
          stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M6 2L3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4z"></path>
          <line x1="3" y1="6" x2="21" y2="6"></line>
          <path d="M16 10a4 4 0 0 1-8 0"></path>
        </svg>
        <span class="brand-name">ShopSimple</span>
      </a>

      <!-- Cart Button -->
      <button id="cart-btn" class="cart-trigger-btn" aria-label="Open Cart">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none"
          stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="9" cy="21" r="1"></circle>
          <circle cx="20" cy="21" r="1"></circle>
          <path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"></path>
        </svg>
        <span class="cart-btn-text">Cart</span>
        <span id="cart-badge" class="cart-badge">0</span>
      </button>

    </div>
  </header>

  <!-- Hero / Banner Section -->
  <section class="hero-section">
    <div class="hero-content">
      <span class="hero-tag">New Collection 2026</span>
      <h1 class="hero-title">Simple products, great prices</h1>
      <p class="hero-subtitle">Shop electronics, jewelry, fashion & more — all in one place.</p>
    </div>
  </section>

  <!-- Main Content Area -->
  <main class="main-container">

    <!-- Search & Filter Controls -->
    <section class="filter-panel">

      <!-- Search Input -->
      <div class="search-box">
        <svg class="search-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none"
          stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="11" cy="11" r="8"></circle>
          <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
        </svg>
        <input type="text" id="search-input" placeholder="Search products..." />
        <button id="clear-search-btn" class="clear-btn hidden">&times;</button>
      </div>

      <!-- Category Pills + Price Slider -->
      <div class="filters-row">

        <!-- Category Filter -->
        <div class="category-filter-wrapper">
          <label class="filter-label">Category</label>
          <div id="categories-container" class="category-pills">
            <!-- "All" pill is default; more are added by JS -->
            <button class="category-pill active" data-category="all">All</button>
          </div>
        </div>

        <!-- Price Range Slider -->
        <div class="price-filter-wrapper">
          <div class="price-header">
            <span class="filter-label">Max Price</span>
            <span id="price-display" class="price-value">$1000</span>
          </div>
          <input type="range" id="price-range" min="0" max="1000" step="5" value="1000" />
        </div>

      </div>
    </section>

    <!-- Product Count + Section Title -->
    <div class="results-header">
      <h2 class="section-title">Products</h2>
      <span id="results-count" class="results-count">Loading...</span>
    </div>

    <!-- Product Cards Grid -->
    <section id="products-grid" class="products-grid">
      <!-- Cards are generated by JavaScript -->
    </section>

  </main>

  <!-- Cart Drawer (slides in from right) -->
  <div id="cart-drawer-overlay" class="cart-overlay">
    <div class="cart-drawer">

      <!-- Cart Header -->
      <div class="cart-header">
        <div class="cart-title-group">
          <h3>Your Cart</h3>
          <span id="cart-count-title" class="cart-count-tag">0 items</span>
        </div>
        <button id="close-cart-btn" class="close-drawer-btn" aria-label="Close Cart">&times;</button>
      </div>

      <!-- Cart Items List -->
      <div id="cart-items-container" class="cart-body">
        <!-- Items appear here when added -->
      </div>

      <!-- Cart Summary + Checkout -->
      <div class="cart-footer">
        <div class="summary-row">
          <span>Subtotal</span>
          <span id="cart-subtotal" class="summary-amount">$0.00</span>
        </div>
        <div class="summary-row shipping">
          <span>Shipping</span>
          <span class="free-shipping">FREE</span>
        </div>
        <div class="summary-row total">
          <span>Total</span>
          <span id="cart-total" class="total-amount">$0.00</span>
        </div>
        <button id="checkout-btn" class="checkout-btn">Checkout</button>
      </div>

    </div>
  </div>

  <!-- Toast Notification Messages -->
  <div id="toast-container" class="toast-container"></div>

  <!-- Footer -->
  <footer class="footer">
    <p>&copy; 2026 My Shop. Made with HTML, CSS &amp; JavaScript.</p>
  </footer>

  <!-- JavaScript Logic -->
  <script src="script.js"></script>
</body>
</html>
